name: Bump Version on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Determine bump type
        id: bump-type
        run: |
          # Check PR labels for bump type
          LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          if echo "$LABELS" | grep -q "bump:major"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "bump:minor"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump backend version
        run: |
          cd backend
          uv version --bump ${{ steps.bump-type.outputs.type }} --no-sync
          echo "Backend bumped to $(uv version --short)"

      - name: Bump frontend version
        run: |
          cd frontend
          npm version ${{ steps.bump-type.outputs.type }} --no-git-tag-version
          echo "Frontend bumped to $(node -p "require('./package.json').version")"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/pyproject.toml frontend/package.json
          git commit -m "chore: bump versions [${{ steps.bump-type.outputs.type }}]"
          git push
